name: Linux Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-linux:
    name: Build Linux App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: sudo apt-get update -y && sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build Linux
        run: flutter build linux --release

      - name: Archive Linux Build
        run: tar -czvf gravity-habit-linux.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: gravity-habit-linux
          path: gravity-habit-linux.tar.gz
