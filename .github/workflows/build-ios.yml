name: iOS Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Archive iOS Build
        run: tar -czvf gravity-habit-ios.tar.gz -C build/ios/iphoneos Runner.app

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: gravity-habit-ios
          path: gravity-habit-ios.tar.gz
