name: gravity_habit
description: "Small actions. Massive pull."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Routing
  go_router: ^13.0.0

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2

  # Preferences
  shared_preferences: ^2.2.2

  # Animations
  flutter_animate: ^4.3.0
  rive: ^0.12.4
  lottie: ^3.0.0

  # Charts
  fl_chart: ^0.66.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # Audio
  just_audio: ^0.9.36

  # Ads & IAP
  google_mobile_ads: ^5.0.0
  in_app_purchase: ^3.1.13

  # Biometrics
  local_auth: ^2.1.8

  # Utils
  uuid: ^4.2.2
  intl: 0.20.2
  collection: ^1.18.0
  flutter_secure_storage: ^9.0.0
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  permission_handler: ^11.1.0
  device_info_plus: ^10.0.1
  package_info_plus: 9.0.1
  sensors_plus: ^4.0.2
  wakelock_plus: ^1.1.4
  webview_flutter: ^4.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  very_good_analysis: ^5.1.0
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  isar_generator: ^3.1.0+1
  golden_toolkit: ^0.15.0
  mocktail: ^1.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/audio/cosmos/
    - assets/audio/forest/
    - assets/audio/analog/
    - assets/haptics/
    - assets/data/
    - assets/rive/
    - assets/lottie/
    - assets/images/

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.ttf
        - asset: assets/fonts/OpenDyslexic-Bold.ttf
          weight: 700
